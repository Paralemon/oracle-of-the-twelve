<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Oracle XII" />
  <meta name="theme-color" content="#0b0b14" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="icon" type="image/png" href="icon-192.png" />
  <title>Oracle of the Twelve</title>
  <style>
    :root { --gold: #d9b15a; --ink: #0b0b14; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; height: 100%; overflow: hidden; background: var(--ink); }
    body {
      font-family: "Georgia", "Times New Roman", serif;
      color: #e9e3d2; touch-action: none;
    }
    #app { position: fixed; inset: 0; }
    canvas { display: block; width: 100%; height: 100%; }

    .hud { position: fixed; left: 0; right: 0; pointer-events: none; z-index: 5; }
    #topbar { top: 0; padding: 18px 16px 8px; text-align: center; }
    #title { font-size: 30px; letter-spacing: 4px; color: var(--gold);
      text-transform: uppercase; opacity: .9; }
    #state { margin-top: 7px; font-size: 18px; letter-spacing: 3px; opacity: .55; }

    #result {
      position: fixed; left: 50%; top: 16%; transform: translateX(-50%);
      display: flex; gap: 14px; z-index: 6; pointer-events: none;
      opacity: 0; transition: opacity .6s ease;
    }
    #result.show { opacity: 1; }
    .pip {
      width: 56px; height: 56px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; color: var(--ink); font-weight: bold;
      font-family: "Apple Symbols", "Segoe UI Symbol", "STIXGeneral", serif;
      background: radial-gradient(circle at 35% 30%, #f3e2ad, var(--gold));
      box-shadow: 0 6px 22px rgba(217,177,90,.35), inset 0 0 8px rgba(0,0,0,.2);
    }

    #controls { bottom: 0;
      padding: 18px 16px calc(34px + env(safe-area-inset-bottom, 0px));
      display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .btn {
      pointer-events: auto; cursor: pointer; border: 1px solid var(--gold);
      background: rgba(217,177,90,.08); color: var(--gold);
      padding: 14px 26px; border-radius: 40px; font-size: 15px;
      letter-spacing: 2px; text-transform: uppercase; font-family: inherit;
      backdrop-filter: blur(4px); transition: background .2s, transform .1s;
    }
    .btn { transition: background .15s, transform .12s, box-shadow .2s, border-color .15s, color .15s; }
    /* Press feedback: a clear hue/glow shift the moment a tap lands so the
       user sees the app received it. Works for mouse and touch (and the
       brief .pressed class makes it visible even on a quick tap). */
    .btn:active, .btn.pressed {
      transform: scale(.94);
      background: rgba(217,177,90,.55);
      color: #14121f;
      border-color: #f3d488;
      box-shadow: 0 0 22px rgba(217,177,90,.55);
    }
    .btn.primary { background: rgba(217,177,90,.18); }
    .hint { font-size: 12px; opacity: .4; letter-spacing: 1px; max-width: 320px;
      text-align: center; pointer-events: none; }

    #overlay {
      position: fixed; inset: 0; z-index: 20; background: rgba(11,11,20,.94);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 22px; text-align: center; padding: 30px;
    }
    #overlay h1 { color: var(--gold); letter-spacing: 4px; font-weight: normal;
      font-size: 24px; text-transform: uppercase; margin: 0; }
    #overlay p { opacity: .6; max-width: 340px; line-height: 1.6; margin: 0; }
    .hidden { display: none !important; }

    /* Dice canvas recedes and blurs while a reading is open. */
    #app canvas { transition: filter .7s ease, transform .7s ease; }
    body.reading-open #app canvas { filter: blur(10px) brightness(.55); transform: scale(1.06); }
    body.reading-open .hud { opacity: 0; transition: opacity .5s ease; }

    #reading {
      position: fixed; inset: 0; z-index: 25; overflow-y: auto;
      display: flex; -webkit-overflow-scrolling: touch;
      background: rgba(8,8,14,.5);
      opacity: 0; pointer-events: none; transition: opacity .7s ease;
    }
    #reading.show { opacity: 1; pointer-events: auto; }
    #reading .inner {
      margin: auto; padding: 56px 26px; max-width: 560px;
      display: flex; flex-direction: column; align-items: center;
    }
    #reading .draw {
      text-align: center; color: var(--gold); letter-spacing: 10px;
      font-size: 46px; margin-bottom: 28px; text-indent: 10px;
      text-shadow: 0 2px 18px rgba(217,177,90,.4);
      font-family: "Apple Symbols", "Segoe UI Symbol", "STIXGeneral", serif;
    }
    #reading .body { line-height: 1.8; font-size: 17px; opacity: .92;
      white-space: pre-wrap; text-align: left; }
    #reading .body.dim { opacity: .55; font-style: italic; text-align: center; }
    #reading .actions { display: flex; gap: 12px; justify-content: center;
      flex-wrap: wrap; margin: 34px auto 0; }
    #reading .actions .btn { margin: 0; }

    /* Hopping dots — used as a "the oracle is thinking" indicator.
       Three dots ripple up in sequence so the user knows the app isn't frozen. */
    .dots { display: inline-block; margin-left: 2px; letter-spacing: 2px; }
    .dots span {
      display: inline-block; opacity: .25;
      animation: dotHop 1.25s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: .18s; }
    .dots span:nth-child(3) { animation-delay: .36s; }
    @keyframes dotHop {
      0%, 60%, 100% { transform: translateY(0); opacity: .25; }
      30%           { transform: translateY(-5px); opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div id="topbar" class="hud">
    <div id="title">Oracle of the Twelve</div>
    <div id="state">awaiting the cast</div>
  </div>

  <div id="result"></div>

  <div id="controls" class="hud">
    <button id="interpretBtn" class="btn primary hidden">Interpret the Cast</button>
    <button id="rollBtn" class="btn primary">Cast the Dice</button>
    <div class="hint" id="hint">Shake your phone to stir the dice — hold it still to let them fall.</div>
  </div>

  <div id="reading">
    <div class="inner">
      <div class="draw" id="readingDraw"></div>
      <div class="body" id="readingBody"></div>
      <div class="actions">
        <button id="readingRecast" class="btn primary">Cast Again</button>
        <button id="readingClose" class="btn">Close</button>
      </div>
    </div>
  </div>

  <div id="overlay">
    <h1>Oracle of the Twelve</h1>
    <p>Three twelve-sided dice answer what you ask. Shake to stir them, then hold the phone still to cast.</p>
    <button id="enterBtn" class="btn primary">Enter</button>
    <p id="motionNote" style="font-size:12px;opacity:.4"></p>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
    }
  }
  </script>
  <script type="module" src="./main.js"></script>
  <script>
    // Register the service worker (relative path -> correct scope on GitHub Pages).
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
